<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QR Tracker - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "on-error": "#ffefee",
                      "primary-container": "#ff784e",

                      "on-secondary-fixed-variant": "#704800",
                      "on-primary-fixed-variant": "#571400",
                      "secondary-container": "#ffc87f",
                      "on-secondary-container": "#644000",
                      "surface-container-lowest": "#ffffff",
                      "primary-dim": "#942900",

              "borderRadius": {

              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "body": ["Be Vietnam Pro"],
                      "label": ["Be Vietnam Pro"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .coral-peach-gradient {
            background: linear-gradient(135deg, #F05A28 0%, #F5A623 100%);
        }
        .btn-glow {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Transactional Screen: Navigation Suppressed per Rule -->
<main class="min-h-screen flex flex-col relative overflow-hidden">
<!-- Large Editorial Header -->
<div class="coral-peach-gradient h-[353px] w-full relative flex items-end px-8 pb-12 overflow-hidden">
<!-- Decorative Bleeding Element -->
<div class="absolute -top-12 -right-12 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
<div class="relative z-10 space-y-2">
<div class="inline-flex items-center gap-2 px-3 py-1 bg-white/20 backdrop-blur-md rounded-full mb-4">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">qr_code_2</span>
<span class="text-white text-[0.65rem] font-bold tracking-widest uppercase">Start your journey</span>
</div>
<h1 class="font-headline text-[2.75rem] leading-[1.1] text-white font-extrabold tracking-tight">Create<br/>Account.</h1>
</div>
<!-- Absolute Image Bleed for Editorial Feel -->
<div class="absolute -right-8 bottom-0 w-48 h-48 opacity-40 mix-blend-overlay">
<img alt="abstract kinetic geometric shapes representing logistics and movement with soft orange glow" class="w-full h-full object-contain" data-alt="abstract flowing 3D geometric shapes with soft coral and peach gradients representing kinetic movement and digital logistics" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9ZWOnVmf-zmqwwG7A5MCqLQTSrpXYB800ynOHA2tm76WD1ZAGe5MmCzMbsHVnwvC_5rUPM0tkUkGViPCJ6gEIhRr14WjQ-OaIEwR3dX6zcKmHiUwDTIioe79KhSCjHiwmMt-NGe7rp-Xrq6k9QYlaTWUh9_pIm0vyUzQJXc3MZrhabW-KX_IoVuPZg5WfYm7Txs29LWLtZaC8RSYmDC_dMdY9O-tnRMcsfo895KIG7VxJKW7QlPIZ6YttMpbpgpaIH2pzKdgUXQ"/>
</div>
</div>
<!-- Registration Content Canvas -->
<div class="flex-1 bg-surface -mt-8 rounded-t-[3rem] relative z-20 px-8 pt-10 pb-12 flex flex-col">
<form class="space-y-6">
<!-- Field Group -->
<div class="space-y-4">
<!-- Full Name -->
<div class="relative group">
<label class="block text-[0.7rem] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-2">Full Name</label>
<div class="flex items-center bg-surface-container-lowest rounded-[0.75rem] border border-outline-variant/20 focus-within:border-primary-fixed transition-all duration-300 px-4 py-3.5">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[1.25rem]">person</span>
<input class="bg-transparent border-none p-0 focus:ring-0 w-full text-on-surface placeholder:text-outline-variant/50 text-[0.875rem]" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="relative group">
<label class="block text-[0.7rem] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-2">Email Address</label>
<div class="flex items-center bg-surface-container-lowest rounded-[0.75rem] border border-outline-variant/20 focus-within:border-primary-fixed transition-all duration-300 px-4 py-3.5">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[1.25rem]">mail</span>
<input class="bg-transparent border-none p-0 focus:ring-0 w-full text-on-surface placeholder:text-outline-variant/50 text-[0.875rem]" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="relative group">
<label class="block text-[0.7rem] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-2">Password</label>
<div class="flex items-center bg-surface-container-lowest rounded-[0.75rem] border border-outline-variant/20 focus-within:border-primary-fixed transition-all duration-300 px-4 py-3.5">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[1.25rem]">lock</span>
<input class="bg-transparent border-none p-0 focus:ring-0 w-full text-on-surface placeholder:text-outline-variant/50 text-[0.875rem]" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-outline-variant text-[1.25rem]">visibility_off</span>
</div>
</div>
<!-- Confirm Password -->
<div class="relative group">
<label class="block text-[0.7rem] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-2">Confirm Password</label>
<div class="flex items-center bg-surface-container-lowest rounded-[0.75rem] border border-outline-variant/20 focus-within:border-primary-fixed transition-all duration-300 px-4 py-3.5">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[1.25rem]">verified_user</span>
<input class="bg-transparent border-none p-0 focus:ring-0 w-full text-on-surface placeholder:text-outline-variant/50 text-[0.875rem]" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 px-2 pt-2">
<div class="mt-0.5 h-5 w-5 rounded bg-surface-container-high border border-outline-variant/20 flex items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-primary-fixed text-[1rem]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<p class="text-[0.75rem] text-on-surface-variant leading-relaxed">
                        I agree to the <span class="text-primary-fixed font-semibold">Terms of Service</span> and <span class="text-primary-fixed font-semibold">Privacy Policy</span>.
                    </p>
</div>
<!-- Register Button -->
<button class="w-full coral-peach-gradient text-white font-bold py-4 rounded-full btn-glow shadow-lg shadow-primary-fixed/20 hover:opacity-90 transition-all flex items-center justify-center gap-2 text-[1rem]" type="submit">
                    Create Account
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Back to Login -->
<div class="mt-auto pt-8 text-center">
<p class="text-on-surface-variant text-[0.875rem]">
                    Already have an account? 
                    <a class="text-primary-fixed font-bold ml-1 hover:underline" href="#">Log in</a>
</p>
</div>
</div>
<!-- Ambient Bottom Layer for Depth -->
<div class="h-6 w-full bg-surface-container-lowest"></div>
</main>
</body></html>
