<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QR Tracker - Scanner</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#b31b25",
                      "on-background": "#2d2f2f",
                      "primary": "#a93000",
                      "surface-container": "#e7e8e8",
                      "on-primary-fixed": "#000000",
                      "surface-variant": "#dbdddd",
                      "secondary-dim": "#6f4700",
                      "on-tertiary-fixed": "#2e003c",
                      "on-tertiary-container": "#53066a",
                      "outline": "#767777",
                      "tertiary-dim": "#76308c",
                      "tertiary-container": "#e293f6",
                      "primary-fixed-dim": "#fb612f",
                      "background": "#f6f6f6",
                      "primary-fixed": "#ff784e",
                      "on-error-container": "#570008",
                      "on-primary": "#ffefeb",
                      "surface": "#f6f6f6",
                      "on-secondary": "#fff0e2",
                      "surface-tint": "#a93000",
                      "secondary": "#7f5200",
                      "on-tertiary-fixed-variant": "#5d1573",
                      "on-error": "#ffefee",
                      "primary-container": "#ff784e",
                      "surface-bright": "#f6f6f6",
                      "on-secondary-fixed-variant": "#704800",
                      "on-primary-fixed-variant": "#571400",
                      "secondary-container": "#ffc87f",
                      "on-secondary-container": "#644000",
                      "surface-container-lowest": "#ffffff",
                      "primary-dim": "#942900",
                      "on-tertiary": "#ffeefd",
                      "on-primary-container": "#470f00",
                      "inverse-on-surface": "#9c9d9d",
                      "on-surface": "#2d2f2f",
                      "secondary-fixed-dim": "#ffb548",
                      "tertiary": "#843d99",
                      "outline-variant": "#acadad",
                      "surface-dim": "#d3d5d5",
                      "surface-container-highest": "#dbdddd",
                      "on-surface-variant": "#5a5c5c",
                      "error-container": "#fb5151",
                      "secondary-fixed": "#ffc87f",
                      "on-secondary-fixed": "#4a2e00",
                      "tertiary-fixed": "#e293f6",
                      "surface-container-high": "#e1e3e3",
                      "inverse-primary": "#fb612f",
                      "error-dim": "#9f0519",
                      "tertiary-fixed-dim": "#d386e7",
                      "inverse-surface": "#0c0f0f",
                      "surface-container-low": "#f0f1f1"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "body": ["Be Vietnam Pro"],
                      "label": ["Be Vietnam Pro"]
              }
            },
          }
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scan-frame {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
        }
        .blur-panel {
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Scanner Camera Preview (Simulated with image) -->
<div class="relative h-screen w-full bg-black overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Warehouse interior with boxes and shelves in low light" class="w-full h-full object-cover opacity-80 scale-110 blur-[2px]" data-alt="cinematic low angle shot of organized warehouse shelves with cardboard boxes under dim industrial lighting, moody and high contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCV9_Deh6MM99xMdl30N531B8pwDG_-bMaWwDEPRPwkAMJnVwFJWU4uPtlBlP8gjFdQgCowdrahz3swhFLlZ33FIdNLZG_Mjjvx5DRFuvPIMw_jNzWwgjydJt2Ud1GA_BDlHfP2l-WM4iHHgjaUkrC_ZpJXb3VB8RE0glfjCkrEYdzNERadCbfBSWPGampfnlHIqpzOHQzGpHU4qct9aFWHHTmSayWH18YPfQ4bdYQz6gqkocDRv3e2KR5wtOutArVKx5Voln-SQQ"/>
</div>
<!-- Header Overlays -->
<div class="absolute top-0 left-0 w-full px-6 pt-14 flex justify-between items-center z-20">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 text-white backdrop-blur-md hover:bg-black/50 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 text-white backdrop-blur-md hover:bg-black/50 transition-colors">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
</div>
</div>
<!-- Scan Frame Area -->
<div class="absolute inset-0 flex items-center justify-center z-10">
<div class="relative w-72 h-72">
<!-- Overlay Shadow -->
<div class="scan-frame absolute inset-0 rounded-[3rem] border-2 border-white/40"></div>
<!-- Corner Indicators -->
<div class="absolute -top-1 -left-1 w-10 h-10 border-t-4 border-l-4 border-white rounded-tl-[1.5rem]"></div>
<div class="absolute -top-1 -right-1 w-10 h-10 border-t-4 border-r-4 border-white rounded-tr-[1.5rem]"></div>
<div class="absolute -bottom-1 -left-1 w-10 h-10 border-b-4 border-l-4 border-white rounded-bl-[1.5rem]"></div>
<div class="absolute -bottom-1 -right-1 w-10 h-10 border-b-4 border-r-4 border-white rounded-br-[1.5rem]"></div>
<!-- Laser Pulse Line -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[90%] h-[2px] bg-gradient-to-r from-transparent via-[#F05A28] to-transparent animate-pulse shadow-[0_0_15px_#F05A28]"></div>
</div>
</div>
<!-- Bottom Panel (Editorial Frosted Glass) -->
<div class="absolute bottom-0 left-0 w-full z-30">
<!-- Navigation Shell (BottomNavBar suppressed for focus, but using panel as container) -->
<div class="bg-white/80 backdrop-blur-2xl rounded-t-xl px-8 pt-8 pb-12 shadow-[0px_-12px_32px_rgba(0,0,0,0.1)]">
<!-- Status Indicator -->
<div class="flex items-center justify-center gap-2 mb-8">
<div class="w-2 h-2 rounded-full bg-[#F05A28] animate-ping"></div>
<span class="font-label text-[0.75rem] font-semibold text-on-surface uppercase tracking-widest">Scanning...</span>
</div>
<!-- Input Area (Editorial Style) -->
<div class="space-y-6">
<div class="space-y-2">
<label class="font-label text-[0.65rem] font-bold text-on-surface-variant uppercase tracking-[0.1em] ml-1">Current Hub Location</label>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-5 pl-14 pr-6 font-body text-sm focus:ring-2 focus:ring-primary/20 transition-all text-on-surface" placeholder="Enter location manually" type="text" value="Distribution Center #402"/>
</div>
</div>
<!-- Action Button (The Radiant Action) -->
<button class="w-full bg-gradient-to-r from-[#F05A28] to-[#F5A623] text-white font-headline text-lg py-5 rounded-full flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-lg shadow-[#F05A28]/20">
<span class="material-symbols-outlined" data-icon="barcode_scanner">barcode_scanner</span>
                        Capture Manual ID
                    </button>
</div>
<!-- Guidance Hint -->
<p class="text-center mt-8 text-on-surface-variant text-[0.875rem] font-body opacity-60">
                    Align QR code within the frame for auto-detection
                </p>
</div>
</div>
</div>
<!-- Bottom Navigation (Mobile View) -->
<!-- Applying Shared Component: BottomNavBar destination Scan active -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#DBDDDD] dark:bg-gray-800 rounded-t-[3rem] shadow-[0px_-12px_32px_rgba(26,26,26,0.06)]">
<div class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 hover:text-[#F05A28] transition-all">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label text-[0.75rem] font-semibold">Home</span>
</div>
<!-- Active Tab: Scan -->
<div class="flex flex-col items-center justify-center text-[#F05A28] font-bold scale-110">
<span class="material-symbols-outlined mb-1" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label text-[0.75rem] font-semibold">Scan</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 hover:text-[#F05A28] transition-all">
<span class="material-symbols-outlined mb-1" data-icon="inventory_2">inventory_2</span>
<span class="font-label text-[0.75rem] font-semibold">Packages</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 hover:text-[#F05A28] transition-all">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-label text-[0.75rem] font-semibold">Alerts</span>
</div>
</nav>
</body></html>
